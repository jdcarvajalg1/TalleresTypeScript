<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Series</title>

    <link 
        rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css"
    >
</head>
<body>

    <nav class="navbar navbar-dark bg-info mb-4">
        <span class="navbar-brand mb-0 h1">TV Series</span>
    </nav>

    <div class="container">
        <div class="row">

            <div class="col-8">
                <table class="table table-striped">
                    <thead class="thead-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Channel</th>
                            <th>Seasons</th>
                        </tr>
                    </thead>

                    <tbody id="series-body">
                    </tbody>
                </table>

                <p id="average-seasons" class="mt-3"></p>
            </div>

            <div id="serie-detail" class="col-4">
            </div>

        </div>
    </div>

    <script type="module" src="./dist/main.js"></script>
</body>
</html>
